$kind: http-request
description: "Demonstrates the triangle inequality failure (1 + 2 ≤ 100).
  Expects `valid: false`."
url: "{{base_url}}/graphql"
method: POST
headers:
  Authorization: Bearer {{jwt_token}}
  Content-Type: application/json
body:
  type: json
  content: >-
    {
      "operationName": "AllValidations",
      "query": "query AllValidations($a: Float!, $b: Float!, $c: Float!) {\n  allValidations(a: $a, b: $b, c: $c) {\n    valid\n    triangleType\n    message\n  }\n}",
      "variables": {
        "a": 1,
        "b": 2,
        "c": 100
      }
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      var result = pm.response.json().data.allValidations;

      pm.test('valid is false', () => pm.expect(result.valid).to.be.false);

      pm.test('triangleType is null', () =>
      pm.expect(result.triangleType).to.be.null);
    language: text/javascript
order: 2000
