$kind: http-request
description: >-
  Returns all audit_log rows where caller_id = 'admin' and datetime_received is
  within the past 90 days, ordered newest first.


  The heavy fields (requestHeaders, requestBody, responseBody) are omitted from
  the default selection — add them to the query if needed.
url: "{{base_url}}/graphql"
method: POST
headers:
  Authorization: Bearer {{jwt_token}}
  Content-Type: application/json
body:
  type: json
  content: >-
    {
      "operationName": "DBadmin90D",
      "query": "query DBadmin90D {\n  dbAdmin90d {\n    id\n    requestId\n    callerId\n    datetimeReceived\n    queryName\n    inputData\n    outputData\n    durationMs\n  }\n}"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      var json = pm.response.json();

      pm.test('No GraphQL errors', () =>
      pm.expect(json).to.not.have.property('errors'));

      pm.test('dbAdmin90d field present', () =>
      pm.expect(json.data).to.have.property('dbAdmin90d'));

      pm.test('dbAdmin90d is an array', () =>
      pm.expect(json.data.dbAdmin90d).to.be.an('array'));
    language: text/javascript
order: 1000
