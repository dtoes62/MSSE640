$kind: http-request
description: >-
  Returns all audit_log rows where caller_id = 'anonymous' and datetime_received
  is within the past 90 days, ordered newest first.


  Anonymous rows are requests that arrived without a valid JWT token (401
  responses). This query is useful for spotting unauthorized access attempts.
url: "{{base_url}}/graphql"
method: POST
headers:
  Authorization: Bearer {{jwt_token}}
  Content-Type: application/json
body:
  type: json
  content: >-
    {
      "operationName": "DBanonymous90D",
      "query": "query DBanonymous90D {\n  dbAnonymous90d {\n    id\n    requestId\n    callerId\n    datetimeReceived\n    queryName\n    inputData\n    outputData\n    durationMs\n  }\n}"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      var json = pm.response.json();

      pm.test('No GraphQL errors', () =>
      pm.expect(json).to.not.have.property('errors'));

      pm.test('dbAnonymous90d field present', () =>
      pm.expect(json.data).to.have.property('dbAnonymous90d'));

      pm.test('dbAnonymous90d is an array', () =>
      pm.expect(json.data.dbAnonymous90d).to.be.an('array'));
    language: text/javascript
order: 2000
