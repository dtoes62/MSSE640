<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Triangle GraphQL API — GraphiQL</title>
  <link rel="stylesheet" href="https://unpkg.com/graphiql@3.8.3/graphiql.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/@graphiql/plugin-explorer@1.0.2/dist/style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; }

    /* ── Login overlay ─────────────────────────────────────────── */
    #login-overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #1a1a2e; z-index: 1000;
    }
    .login-card {
      background: #16213e; border: 1px solid #0f3460;
      border-radius: 12px; padding: 2rem; width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .login-card h1 { color: #e94560; font-size: 1.2rem; margin-bottom: .25rem; }
    .login-card p  { color: #8892b0; font-size: .85rem; margin-bottom: 1.5rem; }

    label { display: block; color: #ccd6f6; font-size: .85rem; margin-bottom: .25rem; }
    input[type=text], input[type=password] {
      width: 100%; padding: .6rem .8rem;
      background: #0f3460; border: 1px solid #1a4a8a;
      border-radius: 6px; color: #ccd6f6; font-size: .9rem;
      margin-bottom: 1rem; outline: none;
    }
    input:focus { border-color: #e94560; }

    button.primary {
      width: 100%; padding: .7rem; background: #e94560;
      border: none; border-radius: 6px;
      color: #fff; font-size: .95rem; font-weight: 600; cursor: pointer;
    }
    button.primary:hover    { background: #c73652; }
    button.primary:disabled { background: #444; cursor: not-allowed; }

    .error { color: #e94560; font-size: .85rem; margin-top: .75rem; min-height: 1.2em; }

    /* ── Token status bar ──────────────────────────────────────── */
    #token-bar {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; height: 28px;
      background: #0d1117; border-bottom: 1px solid #30363d;
      color: #58a6ff; font-size: .78rem;
      padding: 0 12px; align-items: center; gap: 8px;
      z-index: 100;
    }
    #token-bar button {
      margin-left: auto; padding: 2px 10px;
      background: transparent; border: 1px solid currentColor;
      border-radius: 4px; color: inherit; cursor: pointer; font-size: .72rem;
    }
    #token-bar button:hover { background: rgba(88,166,255,.1); }
    #token-bar.expiring { color: #f0883e; border-bottom-color: #f0883e; }

    /* ── GraphiQL host ─────────────────────────────────────────── */
    #graphiql { height: 100vh; padding-top: 28px; }
  </style>
</head>
<body>

<!-- Login overlay (visible by default; hidden after successful auth) -->
<div id="login-overlay">
  <div class="login-card">
    <h1>Triangle GraphQL API</h1>
    <p>Authenticate to open the GraphQL explorer</p>
    <form id="login-form" autocomplete="on">
      <label for="username">Username</label>
      <input id="username" type="text" value="admin" autocomplete="username" />
      <label for="password">Password</label>
      <input id="password" type="password" value="secret" autocomplete="current-password" />
      <button id="login-btn" type="submit" class="primary">Get Token &amp; Open GraphiQL</button>
      <div id="error-msg" class="error"></div>
    </form>
  </div>
</div>

<!-- Token status bar (shown while authenticated) -->
<div id="token-bar">
  <span>🔐</span>
  <span id="token-status">Authenticated</span>
  <button id="reauth-btn" title="Clear token and sign in again">Re-authenticate</button>
</div>

<!-- GraphiQL mount point -->
<div id="graphiql"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"                          crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"                  crossorigin="anonymous"></script>
<script src="https://unpkg.com/graphiql@3.8.3/graphiql.min.js"                                crossorigin="anonymous"></script>
<script src="https://unpkg.com/@graphiql/plugin-explorer@1.0.2/dist/index.umd.js"             crossorigin="anonymous"></script>
<script>
'use strict';

const TOKEN_KEY  = 'tri_api_token';
const EXPIRY_KEY = 'tri_api_expiry';
const CALLER_KEY = 'tri_api_caller';

let authToken      = null;
let tokenExpiryMs  = null;
let countdownTimer = null;

// ── localStorage helpers ────────────────────────────────────────
function loadStoredToken() {
  const t = localStorage.getItem(TOKEN_KEY);
  const e = localStorage.getItem(EXPIRY_KEY);
  if (t && e && Date.now() < parseInt(e, 10)) {
    authToken     = t;
    tokenExpiryMs = parseInt(e, 10);
    return true;
  }
  clearToken();
  return false;
}

function saveToken(token, expiresIn, caller) {
  authToken     = token;
  tokenExpiryMs = Date.now() + expiresIn * 1000;
  localStorage.setItem(TOKEN_KEY,  token);
  localStorage.setItem(EXPIRY_KEY, tokenExpiryMs.toString());
  localStorage.setItem(CALLER_KEY, caller || 'user');
}

function clearToken() {
  authToken = tokenExpiryMs = null;
  [TOKEN_KEY, EXPIRY_KEY, CALLER_KEY].forEach(k => localStorage.removeItem(k));
}

// ── Countdown ticker ────────────────────────────────────────────
function startCountdown() {
  if (countdownTimer) clearInterval(countdownTimer);
  const bar    = document.getElementById('token-bar');
  const status = document.getElementById('token-status');
  const caller = localStorage.getItem(CALLER_KEY) || 'user';

  countdownTimer = setInterval(() => {
    const remaining = Math.floor((tokenExpiryMs - Date.now()) / 1000);

    if (remaining <= 0) {
      clearInterval(countdownTimer);
      clearToken();
      bar.classList.add('expiring');
      status.textContent = 'Token expired — please re-authenticate';
      return;
    }

    const m = Math.floor(remaining / 60);
    const s = String(remaining % 60).padStart(2, '0');
    status.textContent = `Signed in as ${caller} — token expires in ${m}:${s}`;
    bar.classList.toggle('expiring', remaining < 120);
  }, 1000);
}

// ── GraphQL fetcher (injects Bearer token automatically) ────────
function graphQLFetcher(params) {
  return fetch('/graphql', {
    method:  'POST',
    headers: {
      'Content-Type':  'application/json',
      'Authorization': `Bearer ${authToken}`,
    },
    body: JSON.stringify(params),
  }).then(r => r.json());
}

// ── Render GraphiQL ─────────────────────────────────────────────
function renderGraphiQL() {
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('token-bar').style.display     = 'flex';
  startCountdown();

  const explorerPlugin = GraphiQLPluginExplorer.explorerPlugin();

  const defaultTabs = [
    {
      title: 'AllValidations',
      query: [
        'query AllValidations($a: Float!, $b: Float!, $c: Float!) {',
        '  allValidations(a: $a, b: $b, c: $c) {',
        '    valid',
        '    triangleType',
        '    message',
        '  }',
        '}',
      ].join('\n'),
      variables: JSON.stringify({ a: 3, b: 4, c: 5 }, null, 2),
    },
    {
      title: 'DBadmin90D',
      query: [
        'query DBadmin90D {',
        '  dbAdmin90d {',
        '    id',
        '    requestId',
        '    callerId',
        '    datetimeReceived',
        '    queryName',
        '    inputData',
        '    outputData',
        '    durationMs',
        '  }',
        '}',
      ].join('\n'),
      variables: '{}',
    },
    {
      title: 'DBanonymous90D',
      query: [
        'query DBanonymous90D {',
        '  dbAnonymous90d {',
        '    id',
        '    requestId',
        '    callerId',
        '    datetimeReceived',
        '    queryName',
        '    inputData',
        '    outputData',
        '    durationMs',
        '  }',
        '}',
      ].join('\n'),
      variables: '{}',
    },
  ];

  ReactDOM.createRoot(document.getElementById('graphiql')).render(
    React.createElement(GraphiQL, {
      fetcher: graphQLFetcher,
      plugins: [explorerPlugin],
      defaultEditorToolsVisibility: 'variables',
      isHeadersEditorEnabled: false,   // headers are managed automatically
      defaultTabs: defaultTabs,
    })
  );
}

// ── Show login ──────────────────────────────────────────────────
function showLogin(message) {
  if (countdownTimer) clearInterval(countdownTimer);
  document.getElementById('token-bar').style.display     = 'none';
  document.getElementById('login-overlay').style.display = 'flex';
  document.getElementById('error-msg').textContent       = message || '';
}

// ── Login form ──────────────────────────────────────────────────
document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');
  const errorMsg = document.getElementById('error-msg');

  btn.disabled    = true;
  btn.textContent = 'Authenticating…';
  errorMsg.textContent = '';

  try {
    const resp = await fetch('/auth/token', {
      method:  'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body:    `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`,
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'Authentication failed');

    saveToken(data.access_token, data.expires_in, username);
    renderGraphiQL();
  } catch (err) {
    errorMsg.textContent = err.message;
    btn.disabled    = false;
    btn.textContent = 'Get Token & Open GraphiQL';
  }
});

// ── Re-authenticate button ──────────────────────────────────────
document.getElementById('reauth-btn').addEventListener('click', () => {
  clearToken();
  showLogin();
});

// ── Boot: use stored token if still valid ───────────────────────
if (loadStoredToken()) {
  renderGraphiQL();
}
</script>
</body>
</html>
